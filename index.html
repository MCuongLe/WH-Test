<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test Đếm Số Dòng - Hasaki Kho</title>
<style>
  * { box-sizing: border-box; touch-action: manipulation; }
  body {
    margin: 0;
    background: #f4f1ea;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 24px 20px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1e3a8a;
    margin: 0 0 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  p.desc {
    font-size: 14px;
    color: #6b7280;
    margin: 0 0 20px 0;
  }
  button#loadBtn {
    width: 100%;
    min-height: 56px;
    border-radius: 12px;
    border: none;
    background: #1e3a8a;
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.2s ease;
  }
  button#loadBtn:active {
    transform: scale(0.96);
  }
  button#loadBtn:disabled {
    background: #93c5fd;
    cursor: default;
  }
  .result-box {
    margin-top: 20px;
    border-radius: 12px;
    background: #ecfdf5;
    border: 1px solid #10b981;
    padding: 16px;
    display: none;
  }
  .result-box.show { display: block; }
  .result-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #10b981;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat-box {
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: #1e3a8a;
  }
  .stat-label {
    font-size: 13px;
    color: #6b7280;
  }
  .updated-time {
    margin-top: 10px;
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
  }
  .error-box {
    margin-top: 20px;
    border-radius: 12px;
    background: #fef2f2;
    border: 1px solid #dc2626;
    padding: 14px;
    display: none;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    color: #dc2626;
  }
  .error-box.show { display: flex; }
  .hint {
    margin-top: 16px;
    font-size: 13px;
    color: #9ca3af;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h1><span>📊</span> TEST ĐẾM SỐ DÒNG</h1>
    <p class="desc">Kiểm tra kết nối tới Google Sheet CSV (Garment Stock Location)</p>

    <button id="loadBtn">🔄 TẢI LẠI DỮ LIỆU</button>

    <div class="result-box" id="resultBox">
      <div class="result-title"><span>✅</span><span>TẢI THÀNH CÔNG</span></div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-num" id="rowCount">-</div>
          <div class="stat-label">Dòng dữ liệu</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="colCount">-</div>
          <div class="stat-label">Số cột</div>
        </div>
      </div>
      <div class="updated-time" id="updatedTime"></div>
    </div>

    <div class="error-box" id="errorBox">
      <span>⚠</span><span id="errorMsg"></span>
    </div>

    <p class="hint" id="hintText">Bấm nút trên để tải dữ liệu từ link CSV và đếm số dòng.</p>
  </div>

<script>
  // === CẤU HÌNH: thay đúng spreadsheetId + gid của Sheet Master ===
  const SPREADSHEET_ID = "1Yl8LXckdhlCgrxgydfUNPZzD5cuK2BJSKBIOAPL-PaI";
  const SHEET_GID = "0";
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

  const loadBtn = document.getElementById("loadBtn");
  const resultBox = document.getElementById("resultBox");
  const errorBox = document.getElementById("errorBox");
  const errorMsg = document.getElementById("errorMsg");
  const hintText = document.getElementById("hintText");

  function parseCsvRows(text) {
    return text.split(/\r\n|\n/).filter(line => line.trim().length > 0);
  }

  async function loadData() {
    loadBtn.disabled = true;
    loadBtn.textContent = "⏳ ĐANG TẢI...";
    resultBox.classList.remove("show");
    errorBox.classList.remove("show");
    hintText.style.display = "none";

    try {
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const lines = parseCsvRows(text);
      const dataRows = Math.max(lines.length - 1, 0);
      const colCount = lines.length > 0 ? lines[0].split(",").length : 0;

      document.getElementById("rowCount").textContent = dataRows;
      document.getElementById("colCount").textContent = colCount;
      document.getElementById("updatedTime").textContent =
        "Cập nhật lúc " + new Date().toLocaleTimeString("vi-VN");

      resultBox.classList.add("show");
    } catch (err) {
      errorMsg.textContent = "Không tải được dữ liệu. Chi tiết lỗi: " + (err.message || String(err));
      errorBox.classList.add("show");
    } finally {
      loadBtn.disabled = false;
      loadBtn.textContent = "🔄 TẢI LẠI DỮ LIỆU";
    }
  }

  loadBtn.addEventListener("click", loadData);
</script>
</body>
</html>
